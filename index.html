<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoL Pro Kite Trainer - Ultimate Edition</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            margin: 0; padding: 0; background: #050811;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; color: #f0e6d2;
        }
        #game-container {
            position: relative;
            border: 2px solid #c8aa6e;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            background: #010a13;
            width: 1100px; height: 700px;
            overflow: hidden;
            cursor: none; 
        }
        canvas { display: block; cursor: none; } 
        #ui {
            position: absolute; top: 15px; left: 15px; right: 15px;
            display: flex; gap: 10px; justify-content: space-between; 
            pointer-events: none; font-size: 13px; font-weight: bold; 
            text-shadow: 0 2px 4px #000; z-index: 10;
        }
        .panel {
            background: rgba(1, 10, 19, 0.9);
            padding: 8px 14px; border: 1px solid #c8aa6e; border-radius: 4px;
            display: flex; align-items: center; gap: 6px;
        }
        #flash-ui { color: #00f2fe; border-color: #00f2fe; }
        #ult-ui { color: #d100d1; border-color: #d100d1; }
        #buff-ui { color: #00ffcc; border-color: #00ffcc; text-shadow: 0 0 5px rgba(0,255,204,0.5); }
        #god-btn {
            position: absolute; bottom: 15px; right: 15px;
            background: rgba(1, 10, 19, 0.85);
            border: 1px solid #c8aa6e; color: #c8aa6e;
            padding: 10px 20px; font-size: 12px; font-weight: bold;
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            border-radius: 4px; transition: 0.2s; z-index: 10;
        }
        #god-btn:hover { background: #1e2328; }
        
        #menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(1, 10, 19, 0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 20px; z-index: 20;
            cursor: default; 
        }
        h1 { color: #c8aa6e; margin-bottom: 5px; font-size: 36px; letter-spacing: 3px; text-shadow: 0 0 10px rgba(200,170,110,0.3); }
        p { color: #a09b8c; max-width: 550px; line-height: 1.6; margin-bottom: 25px; font-size: 14px; }
        .highlight { color: #00ffcc; font-weight: bold; }
        .menu-row { display: flex; gap: 15px; justify-content: center; margin-top: 15px; flex-wrap: wrap; }
        button.action-btn {
            background: linear-gradient(to bottom, #1e2328, #111417);
            border: 1px solid #c8aa6e; color: #c8aa6e;
            padding: 14px 24px; font-size: 13px; font-weight: bold;
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s;
            border-radius: 4px;
        }
        button.action-btn:hover { background: #1e2328; color: #fff; box-shadow: 0 0 15px rgba(200,170,110,0.4); }
        .tempo-stack { font-size: 13px; color: #ff0055; margin-left: 5px; font-weight: normal; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">
        <div class="panel" id="hp-ui" style="color: #4CAF50;">CAN: 100</div>
        <div class="panel" id="buff-ui" style="display: none;">HIZ: 0.0s</div>
        <div class="panel" id="as-ui" style="color: #ffb703;">SALDIRI HIZI: 1.40 <span class="tempo-stack" id="tempo-ui">(+0.00) [0 Yük]</span></div>
        <div class="panel" id="flash-ui">SIÇRA (F): HAZIR</div>
        <div class="panel" id="ult-ui">ULTİ (R): 0 / 15</div>
        <div class="panel" id="score-ui">SKOR: 0</div>
        <div class="panel" id="best-ui" style="color: #00f2fe;">REKOR: 0</div>
    </div>

    <button id="god-btn">ÖLÜMSÜZLÜK: KAPALI</button>
    <div id="menu"></div>
    <canvas id="kiteCanvas" width="1100" height="700"></canvas>
</div>

<script>
    const canvas = document.getElementById('kiteCanvas');
    const ctx = canvas.getContext('2d');

    const LETHAL_TEMPO_BONUSES = [0, 0.05, 0.07, 0.10, 0.15, 0.20, 0.25];

    const CONFIG = {
        MAP_WIDTH: 3200,          
        MAP_HEIGHT: 3200,         
        PLAYER_BASE_SPEED: 4.2,
        PLAYER_BASE_AS_FREE: 1.40,  
        PLAYER_BASE_AS_ARENA: 1.50, 
        PLAYER_RANGE: 260,
        PLAYER_WINDUP_PROP: 0.22, 
        ENEMY_SLOW_MODIFIER: 0.45, 
        ENEMY_SLOW_DURATION: 0.5,  
        FLASH_RANGE: 200,
        FLASH_COOLDOWN: 10,        
        PROJECTILE_SPEED: 18,
    };

    const menu = document.getElementById('menu');
    const hpUi = document.getElementById('hp-ui');
    const buffUi = document.getElementById('buff-ui');
    const asUi = document.getElementById('as-ui');
    const flashUi = document.getElementById('flash-ui');
    const ultUi = document.getElementById('ult-ui');
    const scoreUi = document.getElementById('score-ui');
    const bestUi = document.getElementById('best-ui');
    const godBtn = document.getElementById('god-btn');

    window.addEventListener('contextmenu', e => e.preventDefault());

    let highScore = parseInt(localStorage.getItem('kiteTrainerRecord_v4')) || 0;
    bestUi.innerText = `REKOR: ${highScore}`;

    let active = false;
    let isPaused = false;
    let isCountdown = false;      
    let countdownTimeLeft = 0;    
    let score = 0;
    let consecutiveKills = 0; 
    let lastTime = 0;
    let spawnTimer = 0;
    let godMode = false;
    let currentMode = 'FREE'; 
    
    let freeKillsForHeal = 0;
    let arenaSpawnCount = 0;
    let msBuffTimer = 0;
    
    let camX = 0, camY = 0; 
    let mouseX = 0, mouseY = 0; 
    let mouseWorldX = 0, mouseWorldY = 0;

    const player = {
        x: 550, y: 350, targetX: 550, targetY: 350,
        radius: 16, speed: CONFIG.PLAYER_BASE_SPEED, hp: 100, range: CONFIG.PLAYER_RANGE,
        baseAttackSpeed: CONFIG.PLAYER_BASE_AS_FREE, cooldownTimer: 0, windupTimer: 0,
        isWindingUp: false, lockedTarget: null, flashCooldown: 0,
        customUltReady: false, ultKills: 0,
        bufferedTargetX: null, bufferedTargetY: null, hasBufferedTarget: false,
        inBackswing: false, backswingTimer: 0, maxBackswing: 0,
        lethalTempoStacks: 0,  
        attackMoveTarget: null,
        hasMovedSinceLastAttack: true // Kite zorunluluğu sağlayan yeni kontrol değişkenimiz
    };

    let attackMoveMode = false; 
    let isAttackMoving = false; 
    let amX = 0, amY = 0; 

    let enemies = []; let obstacles = []; let projectiles = []; let enemyProjectiles = []; 
    let floatTexts = []; let shockwaves = []; let clickMarker = null;

    function generateObstacles() {
        obstacles = [];
        const cx = CONFIG.MAP_WIDTH / 2; const cy = CONFIG.MAP_HEIGHT / 2;

        const centralPoints = [
            {x: cx - 450, y: cy - 450}, {x: cx + 450, y: cy - 450}, {x: cx - 450, y: cy + 450}, {x: cx + 450, y: cy + 450},
            {x: cx, y: cy - 600}, {x: cx, y: cy + 600}, {x: cx - 600, y: cy}, {x: cx + 600, y: cy}
        ];
        centralPoints.forEach(p => obstacles.push({ x: p.x, y: p.y, radius: 55 + Math.random() * 25 }));

        for(let i = 0; i < 14; i++) {
            let rx = 300 + Math.random() * (CONFIG.MAP_WIDTH - 600);
            let ry = 300 + Math.random() * (CONFIG.MAP_HEIGHT - 600);
            if(Math.hypot(rx - cx, ry - cy) > 250) {
                obstacles.push({ x: rx, y: ry, radius: 40 + Math.random() * 20 });
            }
        }
    }

    function showMainMenu() {
        menu.style.display = 'flex';
        menu.innerHTML = `
            <h1>ARENA KITE TRAINER</h1>
            <p>Kontroller: Hareket (<span class="highlight">Sağ Tık</span>) | Attack Move (<span class="highlight">A + Sol Tık</span>)<br>
            Sıçra (<span class="highlight">F / Boşluk</span>) | Ulti (<span class="highlight">R - 15 Yükte Bir</span>) | Duraklatma (<span class="highlight">P</span>)</p>
            <div class="menu-row">
                <button class="action-btn" style="border-color: #00ffcc;" onclick="startGame('FREE')">Klasik Free Kite Modu (Tek Ekran)</button>
                <button class="action-btn" onclick="startGame('MELEE')">Sonsuz Arena (Yakın Dövüşçüler)</button>
                <button class="action-btn" onclick="startGame('RANGED')">Sonsuz Arena (Menzilliler)</button>
            </div>
<div style="display: flex; gap: 20px; justify-content: center; margin-top: 25px;">
    <a href="https://instagram.com/kakashi_euw" target="_blank" style="transition: 0.2s;">
        <img src="ig-logo.png" style="width: 45px; cursor: pointer;">
    </a>

    <a href="https://kick.com/kakashi-euw" target="_blank" style="transition: 0.2s;">
        <img src="kick-logo.png" style="width: 45px; cursor: pointer;">
    </a>
</div>
        `;
    }

    function showGameOver() {
        active = false; menu.style.display = 'flex';
        let modeText = 'Klasik Free Mod';
        if (currentMode === 'MELEE') modeText = 'Sonsuz Arena - Yakın Dövüş';
        if (currentMode === 'RANGED') modeText = 'Sonsuz Arena - Menzilli';

        menu.innerHTML = `
            <h1>ŞAMPİYON KATLEDİLDİ</h1>
            <p>Mod: <span class="highlight">${modeText}</span><br>
            Ulaşılan Skor: <span class="highlight">${score}</span><br>
            Maksimum Saldırı Hızı: <span class="highlight">${getCurrentAS().toFixed(2)}</span></p>
            <div class="menu-row"><button class="action-btn" onclick="showMainMenu()">Ana Menüye Dön</button></div>
        `;
    }

    function startGame(mode) {
        currentMode = mode;
        active = true; isPaused = false; isCountdown = false; countdownTimeLeft = 0; score = 0; consecutiveKills = 0; 
        
        freeKillsForHeal = 0;
        arenaSpawnCount = 0;
        msBuffTimer = 0;
        player.speed = CONFIG.PLAYER_BASE_SPEED;
        buffUi.style.display = 'none';

        player.hp = 100; 
        player.baseAttackSpeed = (currentMode === 'FREE') ? CONFIG.PLAYER_BASE_AS_FREE : CONFIG.PLAYER_BASE_AS_ARENA;
        
        player.ultKills = 0; player.customUltReady = false; player.hasBufferedTarget = false;
        player.inBackswing = false; player.backswingTimer = 0;
        player.lethalTempoStacks = 0;
        player.attackMoveTarget = null;
        player.hasMovedSinceLastAttack = true; // Başlangıçta serbest
        
        if (currentMode === 'FREE') {
            player.x = canvas.width / 2; player.y = canvas.height / 2; obstacles = []; 
        } else {
            player.x = CONFIG.MAP_WIDTH / 2; player.y = CONFIG.MAP_HEIGHT / 2; generateObstacles();
        }
        
        player.targetX = player.x; player.targetY = player.y;
        player.isWindingUp = false; player.cooldownTimer = 0; player.lockedTarget = null; player.flashCooldown = 0;
        
        enemies = []; projectiles = []; enemyProjectiles = []; floatTexts = []; shockwaves = []; clickMarker = null;
        isAttackMoving = false; attackMoveMode = false; spawnTimer = 0;

        hpUi.innerText = `CAN: 100`; hpUi.style.color = "#4CAF50";
        flashUi.innerText = `SIÇRA (F): HAZIR`; flashUi.style.borderColor = "#00f2fe";
        updateASUI(); updateUltUI(); scoreUi.innerText = `SKOR: 0`; bestUi.innerText = `REKOR: ${highScore}`;
        menu.style.display = 'none'; lastTime = performance.now();
        
        requestAnimationFrame(update);
    }

    godBtn.addEventListener('click', () => {
        godMode = !godMode;
        godBtn.innerText = godMode ? "ÖLÜMSÜZLÜK: AÇIK" : "ÖLÜMSÜZLÜK: KAPALI";
        godBtn.style.color = godMode ? "#00ffcc" : "#c8aa6e"; godBtn.style.borderColor = godMode ? "#00ffcc" : "#c8aa6e";
    });

    window.addEventListener('keydown', e => {
        if (!active) return;
        const key = e.key.toLowerCase();
        
        if (key === 'p') {
            if (isCountdown) return; 
            if (isPaused) {
                isPaused = false; isCountdown = true; countdownTimeLeft = 2; lastTime = performance.now();
            } else { isPaused = true; }
            return;
        }

        if (isPaused || isCountdown) return; 

        if (key === 'a') attackMoveMode = true;
        if (key === 's') { 
            player.targetX = player.x; player.targetY = player.y; player.hasBufferedTarget = false; 
            isAttackMoving = false; attackMoveMode = false;
            player.attackMoveTarget = null; 
            if (player.isWindingUp) {
                player.isWindingUp = false; player.lockedTarget = null;
                createFloatText(player.x, player.y - 20, "DURDURULDU", "#ffffff");
            }
        }
        if (key === 'f' || e.key === ' ') castFlash(); 
        if (key === 'r') castUltimate(); 
    });

    window.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        mouseX = e.clientX - rect.left;
        mouseY = e.clientY - rect.top;
        mouseWorldX = mouseX + camX;
        mouseWorldY = mouseY + camY;
    });

    window.addEventListener('mousedown', e => {
        if (!active || isPaused || isCountdown) return;
        const rect = canvas.getBoundingClientRect();
        let mX = e.clientX - rect.left + camX; let mY = e.clientY - rect.top + camY;

        if (e.button === 0 && attackMoveMode) { 
            attackMoveMode = false;
            
            // Suistimal Koruması: Oyuncu sağ tıkla hareket etmediyse yeni hedefe kilitlenmeyi engelle
            if (!player.hasMovedSinceLastAttack) {
                createFloatText(player.x, player.y - 20, "ÖNCE SAĞ TIK!", "#ff0055");
                return;
            }
            
            let closestEnemy = null;
            let minDist = Infinity;
            enemies.forEach(en => {
                let d = Math.hypot(en.x - mX, en.y - mY);
                if (d < minDist) {
                    minDist = d;
                    closestEnemy = en;
                }
            });

            if (closestEnemy) {
                isAttackMoving = true;
                player.attackMoveTarget = closestEnemy; 
            } else {
                isAttackMoving = true;
                player.attackMoveTarget = null;
                amX = mX; amY = mY;
            }
            clickMarker = { x: mX, y: mY, r: 2, alpha: 1, color: '255, 50, 50' }; 
        } else if (e.button === 2) { 
            attackMoveMode = false; 
            isAttackMoving = false; 
            player.attackMoveTarget = null; 
            player.hasMovedSinceLastAttack = true; // Sağ tık yapıldığı için kilit açıldı!
            
            if (player.isWindingUp) {
                player.isWindingUp = false; player.lockedTarget = null; player.targetX = mX; player.targetY = mY;
                createFloatText(player.x, player.y - 20, "AA İPTAL!", "#ff4d4d");
                clickMarker = { x: mX, y: mY, r: 2, alpha: 1, color: '255, 77, 77' }; return; 
            }

            if (player.inBackswing) {
                let requiredBackswingTime = currentMode === 'FREE' ? Math.max(player.maxBackswing * 0.55, 0.05) : player.maxBackswing * 0.55;
                
                if (player.backswingTimer > requiredBackswingTime) { 
                    player.inBackswing = false; player.backswingTimer = 0; player.targetX = mX; player.targetY = mY;
                    createFloatText(player.x, player.y - 20, "KUSURSUZ!", "#00ffcc");
                    clickMarker = { x: mX, y: mY, r: 2, alpha: 1, color: '0, 255, 200' };
                } else {
                    player.targetX = mX; player.targetY = mY;
                    createFloatText(player.x, player.y - 20, "GEÇ TEPKİ!", "#ffb703");
                    clickMarker = { x: mX, y: mY, r: 2, alpha: 1, color: '255, 183, 3' };
                }
                return;
            }

            let clickedEnemy = null;
            enemies.forEach(en => { if (Math.hypot(en.x - mX, en.y - mY) < en.radius + 12) clickedEnemy = en; });

            if (clickedEnemy) {
                isAttackMoving = true;
                player.attackMoveTarget = clickedEnemy; 
            } else {
                player.targetX = mX; player.targetY = mY;
                clickMarker = { x: mX, y: mY, r: 2, alpha: 1, color: '0, 255, 100' };
            }
        }
    });

    function castFlash() {
        if (player.flashCooldown > 0) return;
        let dx = mouseWorldX - player.x; let dy = mouseWorldY - player.y; let dist = Math.hypot(dx, dy);
        let targetX = mouseWorldX; let targetY = mouseWorldY;
        
        if (dist > CONFIG.FLASH_RANGE) {
            targetX = player.x + (dx / dist) * CONFIG.FLASH_RANGE; targetY = player.y + (dy / dist) * CONFIG.FLASH_RANGE;
        }

        if (currentMode === 'FREE') {
            targetX = Math.max(player.radius + 5, Math.min(canvas.width - player.radius - 5, targetX));
            targetY = Math.max(player.radius + 5, Math.min(canvas.height - player.radius - 5, targetY));
        } else {
            targetX = Math.max(player.radius + 20, Math.min(CONFIG.MAP_WIDTH - player.radius - 20, targetX));
            targetY = Math.max(player.radius + 20, Math.min(CONFIG.MAP_HEIGHT - player.radius - 20, targetY));
            
            obstacles.forEach(obs => {
                let odist = Math.hypot(targetX - obs.x, targetY - obs.y);
                if (odist === 0) odist = 0.1; 
                if (odist < player.radius + obs.radius) {
                    let overlap = (player.radius + obs.radius) - odist;
                    targetX += ((targetX - obs.x) / odist) * overlap; targetY += ((targetY - obs.y) / odist) * overlap;
                }
            });
        }

        createFloatText(player.x, player.y, "SIÇRA!", "#00f2fe");
        player.x = targetX; player.y = targetY; player.targetX = targetX; player.targetY = targetY;
        player.isWindingUp = false; player.lockedTarget = null; player.hasBufferedTarget = false;
        player.inBackswing = false; player.backswingTimer = 0; player.flashCooldown = CONFIG.FLASH_COOLDOWN;
    }

    function handleKillReward() {
        if (currentMode === 'FREE') {
            freeKillsForHeal++;
            if (freeKillsForHeal >= 20) {
                freeKillsForHeal -= 20; 
                player.hp = Math.min(100, player.hp + 20);
                hpUi.innerText = `CAN: ${Math.max(0, player.hp)}`;
                hpUi.style.color = player.hp > 40 ? "#4CAF50" : "#ff4d4d";
                createFloatText(player.x, player.y - 40, "+20 CAN!", "#4CAF50");
            }
        } else {
            msBuffTimer = 3.0; 
        }
    }

    function castUltimate() {
        if (!player.customUltReady) return;

        shockwaves.push({ x: player.x, y: player.y, r: 10, maxR: 700, alpha: 1 });
        createFloatText(player.x, player.y - 40, "TEMIZLIK!", "#ff00ff");

        if (enemies.length > 0) {
            enemies.forEach(e => {
                score++; consecutiveKills++;
                handleKillReward();
                
                if (currentMode === 'FREE') {
                    // Kalıcı hız artışı üst sınırı 3.00'e kilitlendi
                    if (score % 5 === 0) player.baseAttackSpeed = Math.min(3.00, player.baseAttackSpeed + 0.06); 
                } else {
                    if (player.baseAttackSpeed < 3.00) player.baseAttackSpeed += 0.025;
                }

                createFloatText(e.x, e.y, "KATLEDİLDİ", "#ff00ff");
            });
            enemies = []; 
            
            scoreUi.innerText = `SKOR: ${score}`;
            if (score > highScore) {
                highScore = score; localStorage.setItem('kiteTrainerRecord_v4', highScore);
                bestUi.innerText = `REKOR: ${highScore}`;
            }
        }

        player.ultKills = 0; player.customUltReady = false; 
        spawnTimer = 0; 
        updateUltUI();
    }

    function createFloatText(x, y, text, color) { floatTexts.push({ x, y, text, color, alpha: 1, vy: -1.8 }); }

    function getCurrentAS() {
        if (currentMode === 'FREE') {
            // Lethal Tempo açıkken üst sınır maksimum 3.50 olarak hesaplanır
            let totalAS = player.baseAttackSpeed * (1 + LETHAL_TEMPO_BONUSES[player.lethalTempoStacks]);
            return Math.min(3.50, totalAS);
        } else {
            let maxStacks = 6;
            let stacks = Math.min(maxStacks, Math.floor(consecutiveKills / 3)); 
            return Math.min(3.00, player.baseAttackSpeed * (1 + (stacks * 0.08)));
        }
    }
    
    function updateASUI() {
        if (currentMode === 'FREE') {
            let totalAS = getCurrentAS();
            let stackText = player.lethalTempoStacks === 6 ? "MAX" : player.lethalTempoStacks;
            let currentBonusPct = (LETHAL_TEMPO_BONUSES[player.lethalTempoStacks] * 100).toFixed(0);
            asUi.innerHTML = `SALDIRI HIZI: ${totalAS.toFixed(2)} <span class="tempo-stack" style="color:#00ffcc;">[ÖLÜMCÜL TEMPO: ${stackText} YÜK (+%${currentBonusPct})]</span>`;
        } else {
            let maxStacks = 6;
            let stacks = Math.min(maxStacks, Math.floor(consecutiveKills / 3));
            let bonusAS = player.baseAttackSpeed * (stacks * 0.08);
            asUi.innerHTML = `SALDIRI HIZI: ${player.baseAttackSpeed.toFixed(2)} <span class="tempo-stack">(+${bonusAS.toFixed(2)}) [${stacks} Yük]</span>`;
        }
    }

    function updateUltUI() {
        let ultKey = 'R';
        if (player.customUltReady) {
            ultUi.innerText = `ULTİ (${ultKey}): HAZIR!`; ultUi.style.color = "#ff00ff"; ultUi.style.borderColor = "#ff00ff";
        } else {
            ultUi.innerText = `ULTİ (${ultKey}): ${player.ultKills} / 15`; ultUi.style.color = "#a09b8c"; ultUi.style.borderColor = "#c8aa6e";
        }
    }

    function spawnEnemy() {
        let ex, ey, maxHp, speed;

        if (currentMode === 'FREE') {
            const edge = Math.floor(Math.random() * 4);
            if (edge === 0) { ex = Math.random() * canvas.width; ey = -10; } 
            else if (edge === 1) { ex = canvas.width + 10; ey = Math.random() * canvas.height; }
            else if (edge === 2) { ex = Math.random() * canvas.width; ey = canvas.height + 10; }
            else { ex = -10; ey = Math.random() * canvas.height; }
            
            maxHp = 1; 
            if (score <= 50) {
                speed = 1.6 + (score * 0.008); 
            } else {
                speed = 2.0 + Math.floor((score - 50) / 50) * 0.10;
            }
        } else {
            let angle = Math.random() * Math.PI * 2; let spawnDist = 600; 
            ex = player.x + Math.cos(angle) * spawnDist; ey = player.y + Math.sin(angle) * spawnDist;
            ex = Math.max(50, Math.min(CONFIG.MAP_WIDTH - 50, ex)); ey = Math.max(50, Math.min(CONFIG.MAP_HEIGHT - 50, ey));

            arenaSpawnCount++;
            maxHp = Math.random() < 0.5 ? 1 : 2;
            
            if (score >= 100 && arenaSpawnCount % 7 === 0) maxHp = 5;
            else if (score >= 50 && arenaSpawnCount % 6 === 0) maxHp = 4;
            else if (score >= 30 && arenaSpawnCount % 5 === 0) maxHp = 3;

            let baseSpd = 2.10;
            if (maxHp === 2) baseSpd = 2.00;
            if (maxHp === 3) baseSpd = 1.90;
            if (maxHp === 4) baseSpd = 1.85;
            if (maxHp === 5) baseSpd = 1.80;

            let speedOffset = Math.min(score, 100) * 0.003; 
            if (score > 100) {
                speedOffset += Math.floor((score - 100) / 50) * 0.10;
            }
            
            speed = baseSpd + speedOffset;
        }

        enemies.push({ x: ex, y: ey, radius: 15, maxHp: maxHp, hp: maxHp, speed: speed, slowTimer: 0, shootTimer: Math.random() * 2 });
    }

    function takeDamage(amount) {
        if (!active || godMode) return; 
        player.hp -= amount; hpUi.innerText = `CAN: ${Math.max(0, player.hp)}`;
        if(player.hp <= 40) hpUi.style.color = "#ff4d4d"; else hpUi.style.color = "#4CAF50";
        
        if (currentMode !== 'FREE' && consecutiveKills >= 3) createFloatText(player.x, player.y - 30, "TEMPO KAYBEDİLDİ!", "#ff0055");
        consecutiveKills = 0;
        
        if (currentMode === 'FREE' && player.lethalTempoStacks > 0) {
            player.lethalTempoStacks = 0;
            createFloatText(player.x, player.y - 20, "TEMPO İPTAL!", "#ff4d4d");
        }

        if (player.hp <= 0) showGameOver(); 
    }

    function handleWallCollision(entity) {
        obstacles.forEach(obs => {
            let dx = entity.x - obs.x; let dy = entity.y - obs.y; let dist = Math.hypot(dx, dy);
            if (dist === 0) dist = 0.1; 
            let minDist = entity.radius + obs.radius;
            if (dist < minDist) {
                let overlap = minDist - dist;
                entity.x += (dx / dist) * overlap; entity.y += (dy / dist) * overlap;
            }
        });
    }

    function update(timestamp) {
        if (!active) return;
        if (isPaused) { draw(); requestAnimationFrame(update); lastTime = timestamp; return; }

        if (isCountdown) {
            const dtCountdown = (timestamp - lastTime) / 1000; lastTime = timestamp;
            countdownTimeLeft -= dtCountdown;
            if (countdownTimeLeft <= 0) isCountdown = false;
            draw(); requestAnimationFrame(update); return;
        }

        const dt = (timestamp - lastTime) / 1000; lastTime = timestamp;
        
        if (msBuffTimer > 0) {
            msBuffTimer -= dt;
            player.speed = CONFIG.PLAYER_BASE_SPEED + 1.2; 
            buffUi.style.display = 'flex';
            buffUi.innerText = `HIZ: ${msBuffTimer.toFixed(1)}s`;
            if (msBuffTimer <= 0) {
                player.speed = CONFIG.PLAYER_BASE_SPEED;
                buffUi.style.display = 'none';
            }
        } else {
            player.speed = CONFIG.PLAYER_BASE_SPEED;
            buffUi.style.display = 'none';
        }

        // Lethal Tempo menzili istek üzerine çok küçük bir artışa (+8 birim) nerflendi
        player.range = CONFIG.PLAYER_RANGE + (currentMode === 'FREE' && player.lethalTempoStacks === 6 ? 8 : 0);

        let totalAttackSpeed = getCurrentAS();

        if (currentMode === 'FREE') {
            camX = 0; camY = 0; 
        } else {
            camX = player.x - canvas.width / 2; camY = player.y - canvas.height / 2;
            camX = Math.max(0, Math.min(CONFIG.MAP_WIDTH - canvas.width, camX));
            camY = Math.max(0, Math.min(CONFIG.MAP_HEIGHT - canvas.height, camY));
        }

        if (player.cooldownTimer > 0) player.cooldownTimer -= dt;
        if (player.inBackswing) {
            player.backswingTimer -= dt;
            if (player.backswingTimer <= 0) player.inBackswing = false;
        }

        if (player.flashCooldown > 0) {
            player.flashCooldown -= dt;
            flashUi.innerText = `SIÇRA (F): ${Math.ceil(player.flashCooldown)}s`; flashUi.style.borderColor = "#ff4d4d";
        } else {
            flashUi.innerText = `SIÇRA (F): HAZIR`; flashUi.style.borderColor = "#00f2fe";
        }

        if (!player.isWindingUp && !player.inBackswing && isAttackMoving) {
            if (player.attackMoveTarget) {
                if (!enemies.includes(player.attackMoveTarget)) {
                    player.attackMoveTarget = null;
                    isAttackMoving = false;
                } else {
                    let distToTarget = Math.hypot(player.attackMoveTarget.x - player.x, player.attackMoveTarget.y - player.y);
                    if (distToTarget <= player.range) {
                        // Eğer oyuncu ritme uyup sağ tıkla hareket ettiyse atışa izin ver
                        if (player.hasMovedSinceLastAttack) {
                            player.targetX = player.x; player.targetY = player.y;
                            if (player.cooldownTimer <= 0) {
                                player.isWindingUp = true; player.lockedTarget = player.attackMoveTarget;
                                player.windupTimer = (1 / totalAttackSpeed) * CONFIG.PLAYER_WINDUP_PROP;
                                player.hasMovedSinceLastAttack = false; // Atış başladı, kilit kapandı!
                            }
                        } else {
                            // Sağ tık yapmadıysa sadece hedefe doğru yürür ama ateş etmez
                            player.targetX = player.attackMoveTarget.x;
                            player.targetY = player.attackMoveTarget.y;
                        }
                    } else {
                        player.targetX = player.attackMoveTarget.x;
                        player.targetY = player.attackMoveTarget.y;
                    }
                }
            } else {
                player.targetX = amX; player.targetY = amY;
                if (Math.hypot(amX - player.x, amY - player.y) < 6) isAttackMoving = false;
            }
        }

        if (player.isWindingUp) {
            player.windupTimer -= dt;
            if (player.windupTimer <= 0) {
                player.isWindingUp = false; player.cooldownTimer = 1 / totalAttackSpeed;
                player.inBackswing = true; player.maxBackswing = (1 / totalAttackSpeed) * 0.45; player.backswingTimer = player.maxBackswing;

                let target = player.lockedTarget;
                if (!enemies.includes(target)) {
                    let minDist = Infinity; target = null; 
                    enemies.forEach(en => {
                        let d = Math.hypot(en.x - player.x, en.y - player.y);
                        if(d < minDist) { minDist = d; target = en; }
                    });
                }

                if (target && Math.hypot(target.x - player.x, target.y - player.y) <= player.range + 25) {
                    projectiles.push({ 
                        x: player.x, y: player.y, target: target, lastTargetX: target.x, lastTargetY: target.y, 
                        speed: CONFIG.PROJECTILE_SPEED, radius: 5 
                    });
                }
                player.lockedTarget = null; player.hasBufferedTarget = false; 
            }
        }

        if (currentMode === 'FREE') {
            let spawnRate = Math.max(0.40, 1.4 - (score * 0.02)); 
            let maxEnemies = Math.min(12, 7 + Math.floor(score / 10)); 
            if (enemies.length < maxEnemies) {
                spawnTimer += dt;
                if (spawnTimer >= spawnRate) { spawnEnemy(); spawnTimer = 0; }
            } else { spawnTimer = 0; }
        } else {
            let spawnRate = Math.max(0.6, 2.0 - (score * 0.04));
            if (enemies.length < 3) spawnRate = 0.5; 
            if (enemies.length < 15) {
                spawnTimer += dt;
                if (spawnTimer >= spawnRate) { spawnEnemy(); spawnTimer = 0; }
            } else { spawnTimer = 0; }
        }

        if (!player.isWindingUp && !player.inBackswing) {
            const dx = player.targetX - player.x; const dy = player.targetY - player.y; const dist = Math.hypot(dx, dy);
            if (dist > 3) { player.x += (dx / dist) * player.speed; player.y += (dy / dist) * player.speed; }
        }
        
        if (currentMode === 'FREE') {
            player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));
        } else {
            player.x = Math.max(player.radius, Math.min(CONFIG.MAP_WIDTH - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(CONFIG.MAP_HEIGHT - player.radius, player.y));
            handleWallCollision(player);
        }

        for (let i = enemies.length - 1; i >= 0; i--) {
            const e = enemies[i];
            if (e.slowTimer > 0) e.slowTimer -= dt;

            let currentEnemySpeed = e.slowTimer > 0 ? e.speed * CONFIG.ENEMY_SLOW_MODIFIER : e.speed;
            const dx = player.x - e.x; const dy = player.y - e.y; const dist = Math.hypot(dx, dy);

            if (dist > 5) { e.x += (dx / dist) * currentEnemySpeed; e.y += (dy / dist) * currentEnemySpeed; }
            if (currentMode !== 'FREE') handleWallCollision(e); 

            if (currentMode === 'RANGED') {
                e.shootTimer += dt;
                if (e.shootTimer >= 2.2 && dist < 450) {
                    e.shootTimer = 0;
                    enemyProjectiles.push({ x: e.x, y: e.y, vx: (dx / dist) * 6.5, vy: (dy / dist) * 6.5, radius: 5 });
                }
            }

            if (dist < player.radius + e.radius) {
                takeDamage(currentMode === 'RANGED' ? 15 : 20); enemies.splice(i, 1);
            }
        }

        for (let i = enemyProjectiles.length - 1; i >= 0; i--) {
            const ep = enemyProjectiles[i]; ep.x += ep.vx; ep.y += ep.vy;
            if (Math.hypot(player.x - ep.x, player.y - ep.y) < player.radius + ep.radius) {
                takeDamage(12); enemyProjectiles.splice(i, 1); continue;
            }
            if (ep.x < 0 || ep.x > CONFIG.MAP_WIDTH || ep.y < 0 || ep.y > CONFIG.MAP_HEIGHT) { enemyProjectiles.splice(i, 1); }
        }

        for (let i = projectiles.length - 1; i >= 0; i--) {
            const p = projectiles[i];
            if (enemies.includes(p.target)) { p.lastTargetX = p.target.x; p.lastTargetY = p.target.y; }

            const dx = p.lastTargetX - p.x; const dy = p.lastTargetY - p.y; const dist = Math.hypot(dx, dy);

            if (dist < p.radius + 15) { 
                let hitTarget = enemies.includes(p.target) ? p.target : null;
                projectiles.splice(i, 1);

                if (hitTarget) {
                    hitTarget.hp -= 1; hitTarget.slowTimer = CONFIG.ENEMY_SLOW_DURATION; 

                    if (currentMode === 'FREE') {
                        if (player.lethalTempoStacks < 6) {
                            player.lethalTempoStacks++;
                        }
                    }

                    if (hitTarget.hp <= 0) {
                        const idx = enemies.indexOf(hitTarget);
                        if (idx > -1) enemies.splice(idx, 1);
                        score++; consecutiveKills++;
                        
                        handleKillReward();
                        
                        if (currentMode === 'FREE') {
                            // Kalıcı taban hız artışı üst sınırı tam olarak 3.00'e kilitlendi
                            if (score % 5 === 0) player.baseAttackSpeed = Math.min(3.00, player.baseAttackSpeed + 0.06); 
                        } else {
                            if (player.baseAttackSpeed < 3.00) player.baseAttackSpeed += 0.025; 
                        }
                        
                        if (!player.customUltReady) {
                            player.customUltReady = false; player.ultKills++;
                            if (player.ultKills >= 15) {
                                player.customUltReady = true; createFloatText(player.x, player.y - 40, "ULTİ HAZIR (R)!", "#ff00ff");
                            }
                        }
                        updateUltUI();

                        scoreUi.innerText = `SKOR: ${score}`;
                        if (score > highScore) {
                            highScore = score; localStorage.setItem('kiteTrainerRecord_v4', highScore); bestUi.innerText = `REKOR: ${highScore}`;
                        }
                    } else {
                        createFloatText(hitTarget.x, hitTarget.y - 15, "YAVAŞLADI", "#ffcc00");
                    }
                }
            } else {
                p.x += (dx / dist) * p.speed; p.y += (dy / dist) * p.speed;
            }
        }

        for (let i = shockwaves.length - 1; i >= 0; i--) {
            shockwaves[i].r += 12; shockwaves[i].alpha -= 0.02;
            if (shockwaves[i].alpha <= 0 || shockwaves[i].r >= shockwaves[i].maxR) shockwaves.splice(i, 1);
        }

        if (clickMarker) {
            clickMarker.r += 1.0; clickMarker.alpha -= 0.07; if (clickMarker.alpha <= 0) clickMarker = null;
        }
        for (let i = floatTexts.length - 1; i >= 0; i--) {
            floatTexts[i].y += floatTexts[i].vy; floatTexts[i].alpha -= 0.025;
            if (floatTexts[i].alpha <= 0) floatTexts.splice(i, 1);
        }

        updateASUI(); 
        draw(); if (active) requestAnimationFrame(update);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.save(); ctx.translate(-camX, -camY); 

        let mapW = currentMode === 'FREE' ? canvas.width : CONFIG.MAP_WIDTH;
        let mapH = currentMode === 'FREE' ? canvas.height : CONFIG.MAP_HEIGHT;

        ctx.fillStyle = '#020710'; ctx.fillRect(0, 0, mapW, mapH);

        ctx.strokeStyle = 'rgba(200, 170, 110, 0.04)'; ctx.lineWidth = 1;
        for(let i=0; i<mapW; i+=60) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, mapH); ctx.stroke(); }
        for(let i=0; i<mapH; i+=60) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(mapW, i); ctx.stroke(); }

        ctx.strokeStyle = '#c8aa6e'; ctx.lineWidth = 4; ctx.strokeRect(0, 0, mapW, mapH);

        if (currentMode !== 'FREE') {
            obstacles.forEach(obs => {
                let grad = ctx.createRadialGradient(obs.x, obs.y, 5, obs.x, obs.y, obs.radius);
                grad.addColorStop(0, '#1b263b'); grad.addColorStop(1, '#0d131f');
                ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(obs.x, obs.y, obs.radius, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = '#3e5c76'; ctx.lineWidth = 2; ctx.stroke();
            });
        }

        if (clickMarker) {
            ctx.strokeStyle = `rgba(${clickMarker.color}, ${clickMarker.alpha})`;
            ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(clickMarker.x, clickMarker.y, clickMarker.r, 0, Math.PI*2); ctx.stroke();
        }

        if (attackMoveMode) {
            ctx.strokeStyle = 'rgba(0, 190, 255, 0.3)'; ctx.fillStyle = 'rgba(0, 190, 255, 0.02)';
            ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(player.x, player.y, player.range, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        }

        if (currentMode === 'FREE' && player.lethalTempoStacks === 6) {
            ctx.strokeStyle = 'rgba(0, 255, 204, 0.35)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.range, 0, Math.PI * 2);
            ctx.stroke();
        }

        shockwaves.forEach(sw => {
            ctx.strokeStyle = `rgba(255, 0, 255, ${sw.alpha})`; ctx.lineWidth = 5;
            ctx.beginPath(); ctx.arc(sw.x, sw.y, sw.r, 0, Math.PI*2); ctx.stroke();
        });

        enemies.forEach(e => {
            ctx.fillStyle = e.slowTimer > 0 ? '#6a0dad' : '#bd152b';
            ctx.beginPath(); ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5; ctx.stroke();

            if (currentMode !== 'FREE') { 
                let barW = 24; let barH = 4;
                ctx.fillStyle = '#222'; ctx.fillRect(e.x - barW/2, e.y - e.radius - 10, barW, barH);
                ctx.fillStyle = '#ff3333'; ctx.fillRect(e.x - barW/2, e.y - e.radius - 10, barW * (e.hp / e.maxHp), barH);
            }
        });

        projectiles.forEach(p => { ctx.fillStyle = '#ffb703'; ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill(); });
        enemyProjectiles.forEach(ep => { ctx.fillStyle = '#ff4d4d'; ctx.beginPath(); ctx.arc(ep.x, ep.y, ep.radius, 0, Math.PI*2); ctx.fill(); });

        ctx.shadowBlur = player.isWindingUp ? 15 : 4; ctx.shadowColor = player.isWindingUp ? '#ffcc00' : '#00f2fe';
        ctx.fillStyle = player.isWindingUp ? '#ffcc00' : (godMode ? '#00ffcc' : '#00f2fe');
        ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0; 

        ctx.strokeStyle = '#010a13'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(player.x, player.y, player.radius - 4, 0, Math.PI*2); ctx.stroke();

        floatTexts.forEach(ft => {
            ctx.fillStyle = ft.color; ctx.font = "bold 13px Arial";
            ctx.globalAlpha = ft.alpha; ctx.fillText(ft.text, ft.x - 15, ft.y); ctx.globalAlpha = 1.0;
        });

        ctx.restore(); 

        if (isCountdown) {
            ctx.fillStyle = 'rgba(1, 10, 19, 0.6)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00f2fe'; ctx.font = 'bold 80px "Segoe UI", Arial, sans-serif';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(Math.ceil(countdownTimeLeft), canvas.width / 2, canvas.height / 2);
            ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
        }

        if (isPaused) {
            ctx.fillStyle = 'rgba(1, 10, 19, 0.75)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#c8aa6e'; ctx.font = 'bold 32px "Segoe UI", Arial, sans-serif';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('OYUN DURDURULDU', canvas.width / 2, canvas.height / 2 - 20);
            ctx.fillStyle = '#a09b8c'; ctx.font = '16px "Segoe UI", Arial, sans-serif';
            ctx.fillText('Devam etmek için tekrar [P] tuşuna basın', canvas.width / 2, canvas.height / 2 + 25);
            ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic'; 
        }

        if (active && !isPaused && !isCountdown) {
            ctx.save();
            if (attackMoveMode) {
                ctx.strokeStyle = '#ff3333';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(mouseX, mouseY, 7, 0, Math.PI * 2);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(mouseX - 12, mouseY); ctx.lineTo(mouseX + 12, mouseY);
                ctx.moveTo(mouseX, mouseY - 12); ctx.lineTo(mouseX, mouseY + 12);
                ctx.stroke();
            } else {
                ctx.fillStyle = '#c8aa6e';
                ctx.strokeStyle = '#010a13';
                ctx.lineWidth = 2;
                ctx.shadowBlur = 3;
                ctx.shadowColor = '#000';
                
                ctx.beginPath();
                ctx.moveTo(mouseX, mouseY);
                ctx.lineTo(mouseX + 16, mouseY + 12);
                ctx.lineTo(mouseX + 8, mouseY + 14);
                ctx.lineTo(mouseX + 13, mouseY + 22);
                ctx.lineTo(mouseX + 10, mouseY + 24);
                ctx.lineTo(mouseX + 5, mouseY + 16);
                ctx.lineTo(mouseX, mouseY + 20);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
            }
            ctx.restore();
        }
    }

    showMainMenu();
</script>
